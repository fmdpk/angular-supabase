<h4>sign in</h4>
<input [(ngModel)]="email">
<button (click)="signIn()">sign-in</button>
<hr/>
<h4>verify</h4>
<input [(ngModel)]="otp">
<button (click)="verifyOTP()">verify</button>
<hr/>
<button (click)="getTasks()">get tasks</button>
<hr/>
@if (data().length) {
  @for (item of data(); track item.id) {
    <span>{{item | json}}</span>
    <br>
  }
} @else {
  <span>no tasks</span>
}
<br>
<hr>
{{data() | json}}
